# Docker Compose file for Express Node.js application
services:
  # Define the service for the Node.js application
  node-app:

    # if i am using --scale node-app=3 to scale the node app to 3 instances, i cannot set the container name because it will cause a conflict when trying to create multiple containers with the same name. So i will comment it out for now, but if i want to use it, i need to remove the --scale option and run only one instance of the node app.
    # Set the container name and specify the image to use
    # container_name: express-node-app-container
    
    # Specify the image to use for the container, and build it from the current directory
    image: express-node-app-image
    # Build the image from the Dockerfile in the current directory
    # build: .

    # i can comment adding port mapping here because nginx will handle the routing and forwarding to the node app
    # ports:
    #   # Map port 4000 on the host to port 4000 in the container
    #   - "4000:4000"

    env_file:
      - ./.env

    depends_on:
      # - mongo
      - postgres
      - redis

  postgres:
      image: postgres
      restart: always
      volumes:
        - postgres-db:/var/lib/postgresql
      environment:
        POSTGRES_USER: root
        POSTGRES_PASSWORD: example

  # mongo:
  #   image: mongo
  #   restart: always
  #   volumes:
  #     - mongo-db:/data/db
  #   environment:
  #     MONGO_INITDB_ROOT_USERNAME: root
  #     MONGO_INITDB_ROOT_PASSWORD: example

  # mongo-express:
  #   image: mongo-express
  #   restart: always
  #   ports:
  #     - 8082:8081
  #   environment:
  #     ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/
  #     ME_CONFIG_BASICAUTH_ENABLED: true
  #     ME_CONFIG_BASICAUTH_USERNAME: mongoexpressuser
  #     ME_CONFIG_BASICAUTH_PASSWORD: mongoexpresspass
  #   depends_on:
  #     - mongo

  redis:
    image: redis
  
  nginx:
    image: nginx
    volumes:
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
    - "80:80"
    depends_on:
      - node-app

volumes:
  mongo-db:
  postgres-db: